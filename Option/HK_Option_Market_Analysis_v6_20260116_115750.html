            container.innerHTML = html;
        }

        function renderMarketScanner(container) {
            const palette = ['#E3F2FD', '#F3E5F5', '#E8F5E9', '#FBE9E7', '#E0F7FA']; 
            const stockColorMap = {}; let colorIndex = 0;
            [...new Set(marketScanner.map(i => i.stock_code))].slice(0, 5).forEach(s => { stockColorMap[s] = palette[colorIndex++ % 5]; });
            let html = `<div class="p-4" style="max-width: 1400px; margin: 0 auto;"><h5 class="fw-bold mb-3">🚀 Unusual Activity</h5><div class="table-responsive bg-white border rounded"><table class="table table-custom table-hover mb-0"><thead><tr><th>Stock</th><th>Code</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Price</th><th>Vol</th><th>OI</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>`;
            if (marketScanner.length === 0) html += `<tr><td colspan="10" class="text-center p-5 text-muted">No activity found.</td></tr>`;
            else {
                marketScanner.forEach(row => {
                    const typeClass = row.option_type === 'CALL' ? 'tag-call' : 'tag-put';
                    const sColor = stockColorMap[row.stock_code] || '#f8f9fa'; 
                    html += `<tr class="${row.vol_oi_ratio >= 3.0 ? 'row-alert-red' : 'row-alert-yellow'}"><td><span class="stock-badge" style="background-color: ${sColor};">${row.stock_code}</span></td><td class="small font-monospace">${row.code}</td><td><span class="${typeClass}">${row.option_type}</span></td><td class="fw-bold">${row.Strike}</td><td>${row.Expiry}</td><td>${row.Price.toFixed(2)}</td><td>${row.volume.toLocaleString()}</td><td>${row.OpenInterest.toLocaleString()}</td><td class="fw-bold">${row.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(row.Turnover).toLocaleString()}</td></tr>`;
                });
            }
            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function renderAnalysis(container) {
            const data = stocksData[currentTicker].analysis;
            const s = data.summary;
            const html = `<div class="p-4" style="max-width: 1400px; margin: 0 auto;">
                <div class="row g-3 mb-4">
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-primary"><div class="kpi-title">Trend (Net Delta)</div><div class="kpi-value" style="color: ${s.net_delta > 0 ? '#198754' : '#dc3545'}">${s.net_delta > 0 ? 'Bullish' : 'Bearish'}</div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-warning"><div class="kpi-title">Major Walls</div><div class="d-flex justify-content-between"><div><span class="text-danger fw-bold">Call:</span> $${s.call_wall}</div><div><span class="text-success fw-bold">Put:</span> $${s.put_wall}</div></div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-info"><div class="kpi-title">Exp. Range</div><div class="kpi-value">$${(s.spot - s.exp_move).toFixed(2)} - $${(s.spot + s.exp_move).toFixed(2)}</div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-secondary"><div class="kpi-title">Sentiment (Skew)</div><div class="kpi-value">${s.iv_skew > 0 ? '+' : ''}${s.iv_skew.toFixed(2)}%</div></div></div>
                </div>
                <h5 class="fw-bold mb-3">🔥 Today's Activity</h5><div class="table-responsive bg-white border rounded"><table class="table table-custom mb-0"><thead><tr><th>Code</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Price</th><th>Volume</th><th>OI</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>
                    ${data.movers.map(row => {
                        if (row._is_separator) return `<tr class="separator-row"><td colspan="9">🔻 Turnover below $1M 🔻</td></tr>`;
                        return `<tr class="${row.vol_oi_ratio >= 3.0 ? 'row-alert-red' : (row.vol_oi_ratio >= 1.0 ? 'row-alert-yellow' : '')}"><td class="small font-monospace">${row.code}</td><td><span class="${row.option_type==='CALL'?'tag-call':'tag-put'}">${row.option_type}</span></td><td class="fw-bold">${row.Strike}</td><td>${row.Expiry}</td><td>${row.Price.toFixed(2)}</td><td>${row.volume.toLocaleString()}</td><td>${row.OpenInterest.toLocaleString()}</td><td class="fw-bold">${row.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(row.Turnover).toLocaleString()}</td></tr>`;
                    }).join('')}
                </tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function renderHeatmap(container, tabKey) {
            const dataObj = stocksData[currentTicker][tabKey];
            const s = stocksData[currentTicker].analysis.summary;
            if (!dataObj || !dataObj.data || dataObj.data.length === 0) { container.innerHTML = '<div class="p-5 text-center text-muted">No data.</div>'; return; }

            let insight = '';
            if (tabKey==='today') insight = `Hotspot: <span class="highlight-data">${s.hotspot}</span>`;
            if (tabKey==='oi') insight = `Walls: Call $<span class="highlight-data">${s.call_wall}</span> / Put $<span class="highlight-data">${s.put_wall}</span>`;

            const rows=dataObj.index, cols=dataObj.columns, values=dataObj.data;
            const params = stocksData[currentTicker].params || {};
            const currentPrice = parseFloat(params['ul_price']||0);

            let closestIdx = -1, minDiff = Infinity;
            cols.forEach((s, i) => { const diff = Math.abs(parseFloat(s) - currentPrice); if(diff<minDiff){minDiff=diff; closestIdx=i;} });
            let maxVal = 0; values.forEach(r => r.forEach(v => { if(v > maxVal) maxVal = v; }));

            let html = `<div class="insight-box"><div class="insight-title">💡 Insight</div>${insight}</div><div class="p-3"><table class="heatmap-table table-sm table-hover mb-0"><thead class="heatmap-head"><tr><th class="expiry-cell">Expiry \ Strike</th>`;
            cols.forEach((col, i) => { html += `<th class="header-cell ${i===closestIdx?'closest-strike':''}" style="padding:10px; background:#f8f9fa; border:1px solid #dee2e6; text-align:center;" ${i===closestIdx?'id="targetColumn"':''}>${col}</th>`; });
            html += '</tr></thead><tbody>';
            rows.forEach((expiry, rIdx) => {
                html += `<tr><td class="expiry-cell">${expiry}</td>`;
                values[rIdx].forEach((val, cIdx) => {
                    let alpha = (maxVal > 0 && val > 0) ? Math.sqrt(val/maxVal) : 0; if(alpha>1) alpha=1;
                    let valStr = tabKey==='ratio' ? val.toFixed(2) : Math.round(val).toLocaleString();
                    html += `<td class="cell-val ${cIdx===closestIdx?'closest-strike':''}" style="background-color: rgba(13,110,253,${alpha.toFixed(2)}); color: ${alpha>0.5?'white':'black'};">${valStr}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
            setTimeout(() => { const t = document.getElementById('targetColumn'); if(t) t.scrollIntoView({behavior:'auto', block:'nearest', inline:'center'}); }, 100);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
