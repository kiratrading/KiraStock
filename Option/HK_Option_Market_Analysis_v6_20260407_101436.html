        .pulse-bull { border-top-color: #198754; animation: pulse-green 2s infinite; }
        .pulse-bear { border-top-color: #dc3545; animation: pulse-red 2s infinite; }

        table.heatmap-table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }

        .insight-box { background: #f0f7ff; border-left: 5px solid #0d6efd; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 0.9rem; }

            setTimeout(() => { const t = document.getElementById('targetColumn'); if (t) t.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); }, 100);
        }
    </script>
</body>
