                document.getElementById('ma60-val').innerText = d.mas.MA60.toFixed(2);
                
                const peaks = d.records.filter(r => r.IsPeak);
                const resistances = peaks.filter(r => r.Price > d.spotPrice).sort((a,b) => b.Volume - a.Volume).slice(0, 5);
                const supports = peaks.filter(r => r.Price < d.spotPrice).sort((a,b) => b.Volume - a.Volume).slice(0, 5);
                
                const labelMap = {};

                resistances.forEach((r, idx) => { labelMap[r.Price.toFixed(2)] = resNames[idx] || "Resistance"; });

                const peaksAsc = d.peaks;
                let nearestSup = null; let nearestRes = null; let nextRes = null; let nextSup = null;
                for(let i=0; i<peaksAsc.length; i++){
                    if(peaksAsc[i].price > d.spotPrice) {
                        nearestRes = peaksAsc[i];
                        if(i+1 < peaksAsc.length) nextRes = peaksAsc[i+1];
                        if(i-1 >= 0) nearestSup = peaksAsc[i-1];

                    supText += `➖ 暫無明顯支撐區\n`;
                }

                text += resText + spotText + supText;
                text += `━━━━━━━━━━━━━━━━━━\n`;

                // Liquidation Clusters Addition
                if (d.liq_data && (d.liq_data.short_liq.length > 0 || d.liq_data.long_liq.length > 0)) {
                    text += `💣 **大額清算熱區 (Liq Clusters):**\n`;
                    let u_short_liqs = [...new Set(d.liq_data.short_liq.map(x => x.toFixed(2)))].sort((a,b) => b - a);
                    let u_long_liqs = [...new Set(d.liq_data.long_liq.map(x => x.toFixed(2)))].sort((a,b) => b - a);
                    
                    u_short_liqs.forEach(sl => {
                        text += `🪂 向上清算 (空軍爆倉): **${sl}**\n`;
                    });
                    u_long_liqs.forEach(ll => {
                        text += `🩸 向下清算 (多軍爆倉): **${ll}**\n`;
                    });
                    text += `━━━━━━━━━━━━━━━━━━\n`;
                }

                const algoDivs = document.querySelectorAll('.algo-text');
                if(algoDivs.length > 0) {
                     text += `💡 **日內常用路紙:**\n`;
                     algoDivs.forEach(div => { text += `▫️ ${div.innerText.replace(/\n/g, ' ')}\n`; });
                     text += `━━━━━━━━━━━━━━━━━━\n`;
                }

     
                text += `👇 歷史數據整合於KIRA科研模組\n`;
                text += `https://kira-stocknote.streamlit.app/`;

                navigator.clipboard.writeText(text);
                alert('作戰地圖已複製！可以貼到 Telegram 了。');
            }
            
            loadSymbol(currentSym);
        </script>
    </body>
    </html>
