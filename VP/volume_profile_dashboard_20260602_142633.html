            let currentSym = 'GC';
            
            function loadSymbol(sym) {
                currentSym = sym;
                const d = dataMap[sym];
                if(!d) return;
                const trace = {
                    type: 'bar', orientation: 'h',
                    x: d.records.map(r => r.Volume), y: d.records.map(r => r.Price),
                    marker: { color: d.records.map(r => r.Color), line: {width:0} },
                    text: d.records.map(r => r.HoverText), hoverinfo: 'text'
                };
                const layout = {
                    title: { text: sym + " Volume Profile", font: {color:'white', size:18}, x:0.02 },
                    paper_bgcolor: 'black', plot_bgcolor: 'black',
                    margin: { l:50, r:30, t:50, b:30 },
                    xaxis: { showgrid:false, visible:false },
                    yaxis: { showgrid:false, color:'#718096', zeroline:false },
                    shapes: [{ type:'line', y0:d.spotPrice, y1:d.spotPrice, x0:0, x1:1, xref:'paper', line:{color:'#00FF99', width:1, dash:'dash'} }],
                    annotations: [{ x:1, y:d.spotPrice, xref:'paper', text:'Spot: '+d.spotPrice.toFixed(2), showarrow:false, xanchor:'right', yanchor:'bottom', font:{color:'#00FF99', size:10} }]
                };
                Plotly.newPlot('chart-div', [trace], layout, {responsive:true, displayModeBar:false});
                
                document.getElementById('ma5-val').innerText = d.mas.MA5.toFixed(2);
                document.getElementById('ma10-val').innerText = d.mas.MA10.toFixed(2);
                document.getElementById('ma20-val').innerText = d.mas.MA20.toFixed(2);
                document.getElementById('ma60-val').innerText = d.mas.MA60.toFixed(2);
                
                const peaks = d.records.filter(r => r.IsPeak);
                const resistances = peaks.filter(r => r.Price > d.spotPrice).sort((a,b) => b.Volume - a.Volume).slice(0, 5);
                const supports = peaks.filter(r => r.Price < d.spotPrice).sort((a,b) => b.Volume - a.Volume).slice(0, 5);
                
                const labelMap = {};
                const resNames = ["Core Resistance (核心阻力)", "Strong Resistance (強力阻力)", "Secondary Res (次級阻力)", "General Res (一般阻力)", "Intraday Res (短線阻力)"];
                const supNames = ["Strong Support (強力支撐)", "Core Support (核心支撐)", "Secondary Sup (次級支撐)", "General Sup (一般支撐)", "Intraday Sup (短線支撐)"];
                resistances.forEach((r, idx) => { labelMap[r.Price.toFixed(2)] = resNames[idx] || "Resistance"; });
                supports.forEach((r, idx) => { labelMap[r.Price.toFixed(2)] = supNames[idx] || "Support"; });
                
                const peaksAsc = d.peaks;
                let nearestSup = null; let nearestRes = null; let nextRes = null; let nextSup = null;
                for(let i=0; i<peaksAsc.length; i++){
                    if(peaksAsc[i].price > d.spotPrice) {
                        nearestRes = peaksAsc[i];
                        if(i+1 < peaksAsc.length) nextRes = peaksAsc[i+1];
                        if(i-1 >= 0) nearestSup = peaksAsc[i-1];
                        if(i-2 >= 0) nextSup = peaksAsc[i-2];
                        break;
                    }
                }
                if(!nearestRes && peaksAsc.length > 0) {
                     nearestSup = peaksAsc[peaksAsc.length-1];
                     if(peaksAsc.length > 1) nextSup = peaksAsc[peaksAsc.length-2];
                }
                
                const algoBox = document.getElementById('algo-logic-content');
                let algoHTML = '';
                if(nearestRes && nextRes) { algoHTML += `<div class="algo-text algo-bull">若突破 ${(nearestRes.price).toFixed(2)}<br>👉 上看: ${(nextRes.price).toFixed(2)}</div>`; }
                if(nearestSup && nextSup) { algoHTML += `<div class="algo-text algo-bear">若跌穿 ${(nearestSup.price).toFixed(2)}<br>👉 下探: ${(nextSup.price).toFixed(2)}</div>`; }
                if(!algoHTML) algoHTML = '<div class="algo-text">Consolidating...</div>';
                algoBox.innerHTML = algoHTML;
                
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                const finalRes = resistances.sort((a,b) => b.Price - a.Price);
                const finalSup = supports.sort((a,b) => b.Price - a.Price);
                
                finalRes.forEach(r => {
                    const label = labelMap[r.Price.toFixed(2)];
                    let css = 'type-res';
                    if(label.includes('Core') || label.includes('Strong')) css = 'type-res'; 
                    addRow(tbody, label, r.Price, r.Volume, css);
                });
                
                addRow(tbody, '📌 SPOT (當前現價)', d.spotPrice, '-', 'type-spot');
                
                finalSup.forEach(r => {
                    const label = labelMap[r.Price.toFixed(2)];
                    let css = 'type-sup'; 
                    if(label.includes('Core') || label.includes('Strong')) css = 'type-sup';
                    addRow(tbody, label, r.Price, r.Volume, css);
                });
            }
            
            function addRow(tbody, type, price, vol, cssClass) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="${cssClass}">${type}</td><td>${price.toFixed(2)}</td><td>${typeof vol==='number'?(vol/1000).toFixed(1)+'k':vol}</td>`;
                tbody.appendChild(tr);
            }
            
            function copyTable() {
                const d = dataMap[currentSym];
                const rows = document.querySelectorAll('#table-body tr');

                let text = `🚨 **【KiraTrader】${currentSym} Enhanced VolumeProfile** 🦅\n`;
                text += `⏱️ Time: ${new Date().toLocaleString('zh-HK')}\n`;
                text += `━━━━━━━━━━━━━━━━━━\n`;

                let resText = `🎯 **上方阻力區 (空軍防線):**\n`;
                let supText = `🛡️ **下方支撐區 (好友防線):**\n`;

                const mas = [
                    {price: d.mas.MA60, label: "MA60 均線"},
                    {price: d.mas.MA20, label: "MA20 均線"},
                    {price: d.mas.MA10, label: "MA10 均線"},
                    {price: d.mas.MA5, label: "MA5 均線"}
                ];

                const allRes = [];
                const allSup = [];

                rows.forEach(row => {
                    const cols = row.querySelectorAll('td');
                    if(cols.length < 2) return;
                    const type = cols[0].innerText;
                    const priceStr = cols[1].innerText;
                    const priceNum = parseFloat(priceStr);
                    
                    if(type.includes('SPOT')) return;

                    let icon = "⚪️";
                    if(type.includes('Core') || type.includes('Strong')) {
                        if(type.includes('Res')) { icon = "📕"; allRes.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                        if(type.includes('Sup')) { icon = "📘"; allSup.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                    } else {
                        if(type.includes('Res')) { icon = "🔴"; allRes.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                        if(type.includes('Sup')) { icon = "🔵"; allSup.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                    }
                });

                mas.forEach(m => {
                    if(m.price > 0) {
                        if(m.price > d.spotPrice) allRes.push({p: m.price, text: `📉 ${m.label}: ${m.price.toFixed(2)}`});
                        else allSup.push({p: m.price, text: `📉 ${m.label}: ${m.price.toFixed(2)}`});
                    }
                });

                // --- 1. 輸出阻力 ---
                if (allRes.length > 0) {
                    allRes.sort((a,b) => b.p - a.p).forEach(r => resText += r.text + '\n');
                } else {
                    resText += `➖ 暫無明顯阻力區\n`;
                }

                // --- 2. 插入現價 (SPOT) ---
                let spotText = `\n📊 **當前戰況 (SPOT):** ${d.spotPrice.toFixed(2)} 🟢\n\n`;

                // --- 3. 輸出支撐 ---
                if (allSup.length > 0) {
                    allSup.sort((a,b) => b.p - a.p).forEach(s => supText += s.text + '\n');
                } else {
                    supText += `➖ 暫無明顯支撐區\n`;
                }

                text += resText + spotText + supText;
                text += `━━━━━━━━━━━━━━━━━━\n`;

                // Liquidation Clusters Addition
                if (d.liq_data && (d.liq_data.short_liq.length > 0 || d.liq_data.long_liq.length > 0)) {
                    text += `💣 **大額清算熱區 (Liq Clusters):**\n`;
                    let u_short_liqs = [...new Set(d.liq_data.short_liq.map(x => x.toFixed(2)))].sort((a,b) => b - a);
                    let u_long_liqs = [...new Set(d.liq_data.long_liq.map(x => x.toFixed(2)))].sort((a,b) => b - a);
                    
                    u_short_liqs.forEach(sl => {
                        text += `🪂 向上清算 (空軍爆倉): **${sl}**\n`;
                    });
                    u_long_liqs.forEach(ll => {
                        text += `🩸 向下清算 (多軍爆倉): **${ll}**\n`;
                    });
                    text += `━━━━━━━━━━━━━━━━━━\n`;
                }

                const algoDivs = document.querySelectorAll('.algo-text');
                if(algoDivs.length > 0) {
                     text += `💡 **日內常用路紙:**\n`;
                     algoDivs.forEach(div => { text += `▫️ ${div.innerText.replace(/\n/g, ' ')}\n`; });
                     text += `━━━━━━━━━━━━━━━━━━\n`;
                }

     
                text += `👇 歷史數據整合於KIRA科研模組\n`;
                text += `https://kira-stocknote.streamlit.app/`;

                navigator.clipboard.writeText(text);
                alert('作戰地圖已複製！可以貼到 Telegram 了。');
            }
            
            loadSymbol(currentSym);
        </script>
